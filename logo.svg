<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b21b6"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="bar-hi" x1="14" y1="0" x2="66" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.80)"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-bar" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background badge -->
  <rect width="80" height="80" rx="18" fill="url(#bg)"/>

  <!-- Top gloss -->
  <rect x="0" y="0" width="80" height="38" rx="18" fill="url(#shine)"/>

  <!-- Stack bar — bottom (faint) -->
  <rect x="14" y="54" width="52" height="8" rx="4" fill="white" opacity="0.22"/>

  <!-- Stack bar — middle highlight (curated/selected) -->
  <rect x="14" y="41" width="42" height="8" rx="4" fill="url(#bar-hi)" filter="url(#glow-bar)"/>

  <!-- Checkmark on highlighted bar -->
  <path d="M59.5 43.5 L63.5 47.5 L71 40" stroke="white" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Stack bar — top (faint) -->
  <rect x="14" y="28" width="52" height="8" rx="4" fill="white" opacity="0.22"/>

  <!-- 4-point sparkle top-right -->
  <path d="M66 17 L67.2 14 L68.4 17 L71.4 18.2 L68.4 19.4 L67.2 22.4 L66 19.4 L63 18.2 Z"
        fill="white" opacity="0.75"/>
</svg>
