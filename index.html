/* ─── ANIMATED BACKGROUND CANVAS ─────────────── */
(function() {
  const canvas = document.getElementById('bg-canvas')
  const ctx    = canvas.getContext('2d')

  // Aurora blobs config
  const DARK_BLOBS = [
    { x: 0.15, y: 0.12, r: 0.45, color: [124, 58, 237],  speed: 0.00018, phase: 0 },
    { x: 0.80, y: 0.75, r: 0.38, color: [56, 189, 248],  speed: 0.00013, phase: 2.1 },
    { x: 0.55, y: 0.40, r: 0.30, color: [167, 80, 220],  speed: 0.00022, phase: 4.3 },
    { x: 0.25, y: 0.80, r: 0.25, color: [30, 120, 220],  speed: 0.00016, phase: 1.5 },
  ]
  const LIGHT_BLOBS = [
    { x: 0.15, y: 0.12, r: 0.45, color: [167, 139, 250], speed: 0.00018, phase: 0 },
    { x: 0.80, y: 0.75, r: 0.38, color: [56, 189, 248],  speed: 0.00013, phase: 2.1 },
    { x: 0.55, y: 0.40, r: 0.30, color: [200, 150, 255], speed: 0.00022, phase: 4.3 },
    { x: 0.25, y: 0.80, r: 0.25, color: [100, 180, 255], speed: 0.00016, phase: 1.5 },
  ]

  // Floating particles
  const PARTICLE_COUNT = 55
  let particles = []

  function initParticles() {
    particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: 0.8 + Math.random() * 1.8,
      vx: (Math.random() - 0.5) * 0.00012,
      vy: -0.00006 - Math.random() * 0.00010,
      alpha: 0.08 + Math.random() * 0.22,
      phase: Math.random() * Math.PI * 2,
      speed: 0.0004 + Math.random() * 0.0006,
    }))
  }
  initParticles()

  function resize() {
    canvas.width  = window.innerWidth
    canvas.height = window.innerHeight
  }
  window.addEventListener('resize', resize)
  resize()

  let t = 0
  let raf

  function draw(ts) {
    t = ts
    const W = canvas.width, H = canvas.height
    const isLight = document.documentElement.getAttribute('data-theme') === 'light'
    const isWin95 = document.documentElement.getAttribute('data-theme') === 'win95'

    ctx.clearRect(0, 0, W, H)

    if (isWin95) {
      // Win95: solid teal — nothing to draw
      raf = requestAnimationFrame(draw)
      return
    }

    // ── Base gradient ──
    const base = ctx.createRadialGradient(W * 0.5, H * 0.5, 0, W * 0.5, H * 0.5, Math.max(W, H) * 0.8)
    if (isLight) {
      base.addColorStop(0, '#f0eeff')
      base.addColorStop(0.5, '#e8f4ff')
      base.addColorStop(1, '#f5f0ff')
    } else {
      base.addColorStop(0, '#0f0c29')
      base.addColorStop(0.5, '#1a1040')
      base.addColorStop(1, '#24243e')
    }
    ctx.fillStyle = base
    ctx.fillRect(0, 0, W, H)

    // ── Aurora blobs ──
    const blobs = isLight ? LIGHT_BLOBS : DARK_BLOBS
    blobs.forEach(b => {
      const wobX = Math.sin(t * b.speed + b.phase) * 0.08
      const wobY = Math.cos(t * b.speed * 0.7 + b.phase) * 0.06
      const cx   = (b.x + wobX) * W
      const cy   = (b.y + wobY) * H
      const rad  = b.r * Math.max(W, H)
      const grd  = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad)
      const alpha = isLight ? 0.10 : 0.20
      grd.addColorStop(0, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},${alpha})`)
      grd.addColorStop(1, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},0)`)
      ctx.fillStyle = grd
      ctx.fillRect(0, 0, W, H)
    })

    // ── Floating particles ──
    particles.forEach(p => {
      p.x += p.vx + Math.sin(t * p.speed + p.phase) * 0.00005
      p.y += p.vy
      if (p.y < -0.02) { p.y = 1.02; p.x = Math.random() }
      if (p.x < -0.02) p.x = 1.02
      if (p.x >  1.02) p.x = -0.02

      const pulse = 0.5 + 0.5 * Math.sin(t * p.speed * 2 + p.phase)
      const a = p.alpha * (0.6 + 0.4 * pulse)
      ctx.beginPath()
      ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2)
      ctx.fillStyle = isLight
        ? `rgba(120,80,220,${a})`
        : `rgba(180,140,255,${a})`
      ctx.fill()
    })

    raf = requestAnimationFrame(draw)
  }

  raf = requestAnimationFrame(draw)

  // Pause animation when tab hidden → saves CPU/GPU, prevents memory-pressure reloads
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      cancelAnimationFrame(raf)
    } else {
      raf = requestAnimationFrame(draw)
    }
  })
})()
</script>

<!-- Motion One + Cursor + Magnetic + Animations -->
<script type="module">
import { animate, inView, stagger } from 'https://cdn.jsdelivr.net/npm/motion@10.18.0/+esm'
const SPRING_OVERSHOOT = [0.34, 1.36, 0.64, 1]   // feels springy without spring()

/* ═══════════════════════════════════════════
   1. CUSTOM CURSOR
═══════════════════════════════════════════ */
;(function initCursor () {
  if (matchMedia('(pointer: coarse)').matches) return

  const dot  = document.getElementById('cs-cursor-dot')
  const ring = document.getElementById('cs-cursor-ring')
  if (!dot || !ring) return

  let mX = -200, mY = -200, rX = -200, rY = -200
  let rScale = 1, rScaleTarget = 1
  let dotScale = 1, dotScaleTarget = 1
  let cursorRingClass = 'cs-cursor-ring'

  document.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY }, { passive: true })

  // Detekcia elementu cez event (nie polling v RAF — eliminuje layout reflow 60x/sek)
  // Scale cielíme číslom namiesto CSS width/height → nula layout reflow
  document.addEventListener('mouseover', e => {
    const el = e.target
    const cta = el.closest('[data-magnetic]')
    const btn = !cta && el.closest('button, a, [onclick], .app-card, .list-row, .kanban-card, .timeline-card, select, input')
    const txt = !cta && !btn && el.closest('p, h1, h2, h3, li')
    const newClass = 'cs-cursor-ring' + (cta ? ' is-cta' : btn ? ' is-hover' : txt ? ' is-text' : '')
    if (newClass !== cursorRingClass) {
      ring.className = cursorRingClass = newClass
      rScaleTarget = cta ? 1.75 : btn ? 1.31 : txt ? 0.1 : 1
    }
  }, { passive: true })

  ;(function tick () {
    rX += (mX - rX) * 0.14
    rY += (mY - rY) * 0.14
    rScale    += (rScaleTarget    - rScale)    * 0.18
    dotScale  += (dotScaleTarget  - dotScale)  * 0.22
    dot.style.transform  = `translate(calc(${mX}px - 50%), calc(${mY}px - 50%)) scale(${dotScale.toFixed(3)})`
    ring.style.transform = `translate(calc(${rX}px - 50%), calc(${rY}px - 50%)) scale(${rScale.toFixed(3)})`
    requestAnimationFrame(tick)
  })()

  document.addEventListener('mousedown', () => { dot.classList.add('is-press'); dotScaleTarget = 0.55 })
  document.addEventListener('mouseup',   () => { dot.classList.remove('is-press'); dotScaleTarget = 1 })
  document.addEventListener('mouseleave', () => { dot.style.opacity = '0'; ring.style.opacity = '0' })
  document.addEventListener('mouseenter', () => { dot.style.opacity = '1'; ring.style.opacity = '1' })
})()

/* ═══════════════════════════════════════════
   2. MAGNETIC ELEMENTS
═══════════════════════════════════════════ */
function initMagnetic () {
  document.querySelectorAll('[data-magnetic]').forEach(el => {
    let cachedRect = null
    el.addEventListener('mouseenter', () => {
      cachedRect = el.getBoundingClientRect() // cache raz, nie 60x/sek
      el.style.transition = 'transform 0.1s ease'
    })
    el.addEventListener('mousemove', e => {
      if (!cachedRect) return
      const dx = (e.clientX - cachedRect.left - cachedRect.width  / 2) * 0.32
      const dy = (e.clientY - cachedRect.top  - cachedRect.height / 2) * 0.32
      el.style.transform = `translate(${dx}px, ${dy}px)`
    })
    el.addEventListener('mouseleave', () => {
      cachedRect = null
      el.style.transition = 'transform 0.55s cubic-bezier(0.25,1,0.5,1)'
      el.style.transform  = ''
    })
  })
}
initMagnetic()

/* ═══════════════════════════════════════════
   3. BUTTON PRESS — spring feedback
═══════════════════════════════════════════ */
const EASE_OUT = [0.22, 1, 0.36, 1]

document.addEventListener('mousedown', e => {
  const btn = e.target.closest('button:not([data-magnetic]), .view-btn')
  if (btn) animate(btn, { scale: 0.91 }, { duration: 0.08 })
})
document.addEventListener('mouseup', e => {
  const btn = e.target.closest('button, .view-btn')
  if (btn) animate(btn, { scale: 1 }, { duration: 0.3, easing: SPRING_OVERSHOOT })
})

/* ═══════════════════════════════════════════
   4. ENTRANCE ANIMATIONS (MutationObserver)
═══════════════════════════════════════════ */
const seen = new WeakSet()

function animateIn (root) {
  root = root || document.getElementById('app-container')

  // Category headers — slide from left
  root.querySelectorAll('.category-header').forEach(el => {
    if (seen.has(el)) return; seen.add(el)
    inView(el,
      () => animate(el, { opacity: [0,1], x: [-20,0] }, { duration: 0.32, easing: EASE_OUT }),
      { margin: '0px 0px -15px 0px' })
  })

  // List rows — staggered x-slide
  const rows = root.querySelectorAll('.list-row')
  rows.forEach((el, i) => {
    if (seen.has(el)) return; seen.add(el)
    animate(el, { opacity: [0,1], x: [-12,0] },
      { delay: i * 0.028, duration: 0.24, easing: EASE_OUT })
  })

  // Table rows — staggered fade-slide
  root.querySelectorAll('table.table-view tbody tr').forEach((el, i) => {
    if (seen.has(el)) return; seen.add(el)
    animate(el, { opacity: [0,1], y: [8,0] },
      { delay: i * 0.022, duration: 0.22, easing: EASE_OUT })
  })

  // Kanban columns — staggered y-rise
  root.querySelectorAll('.kanban-col').forEach((el, i) => {
    if (seen.has(el)) return; seen.add(el)
    animate(el, { opacity: [0,1], y: [22,0] },
      { delay: i * 0.07, duration: 0.32, easing: EASE_OUT })
  })

  // Timeline items — inView x-slide
  root.querySelectorAll('.timeline-item').forEach(el => {
    if (seen.has(el)) return; seen.add(el)
    inView(el,
      () => animate(el, { opacity: [0,1], x: [18,0] }, { duration: 0.28, easing: EASE_OUT }),
      { margin: '0px 0px -20px 0px' })
  })

  // Timeline month labels
  root.querySelectorAll('.timeline-month-label').forEach(el => {
    if (seen.has(el)) return; seen.add(el)
    inView(el,
      () => animate(el, { opacity: [0,1], y: [-10,0] }, { duration: 0.3, easing: EASE_OUT }),
      { margin: '0px 0px -10px 0px' })
  })

  // Re-init magnetic on newly added [data-magnetic] els
  initMagnetic()
}

// Watch for content changes — childList only (not subtree) to avoid firing on every click
const appContainer = document.getElementById('app-container')
new MutationObserver(() => requestAnimationFrame(() => animateIn(appContainer)))
  .observe(appContainer, { childList: true, subtree: false })

/* ═══════════════════════════════════════════
   5. VIEW SWITCH TRANSITION
═══════════════════════════════════════════ */
const _origRender = window.renderApps
window.renderApps = function () {
  animate(appContainer, { opacity: 0.2 }, { duration: 0.07 })
  _origRender.call(window)
  animate(appContainer, { opacity: 1 }, { duration: 0.2, easing: EASE_OUT })
}

/* ═══════════════════════════════════════════
   6. MODAL OPEN ANIMATION
   — animate the .modal panel (NOT the overlay)
   — overlay uses flexbox centering, no transform conflict
═══════════════════════════════════════════ */
const _origOpen = window.openModal
window.openModal = function (id) {
  _origOpen.call(window, id)
  const overlay = document.getElementById('modal-overlay')
  const modal   = document.getElementById('modal')
  if (overlay) animate(overlay, { opacity: [0, 1] }, { duration: 0.18, easing: EASE_OUT })
  if (modal)   animate(modal,   { opacity: [0, 1], y: [20, 0], scale: [0.96, 1] },
    { duration: 0.28, easing: [0.34, 1.2, 0.64, 1] })
}

const _origClose = window.closeModal
let _closing = false
window.closeModal = function () {
  if (_closing) return
  _closing = true
  const overlay = document.getElementById('modal-overlay')
  const modal   = document.getElementById('modal')
  if (modal)   animate(modal,   { opacity: [1, 0], y: [0, 10], scale: [1, 0.97] }, { duration: 0.15 })
  if (overlay) animate(overlay, { opacity: [1, 0] }, { duration: 0.18 })
  setTimeout(() => { _origClose.call(window); _closing = false }, 200)
}

/* ═══════════════════════════════════════════
   7. HERO / NAV ENTRANCE (once)
═══════════════════════════════════════════ */
const hero      = document.querySelector('.hero')
const navbar    = document.querySelector('.navbar')
const filterBar = document.querySelector('.filter-bar')
if (hero)      animate(hero,      { opacity: [0,1], y: [24,0] }, { duration: 0.5, delay: 0.1,  easing: EASE_OUT })
if (navbar)    animate(navbar,    { opacity: [0,1], y: [-8,0] }, { duration: 0.4, easing: EASE_OUT })
if (filterBar) animate(filterBar, { opacity: [0,1], y: [12,0] }, { duration: 0.35, delay: 0.15, easing: EASE_OUT })

/* ═══════════════════════════════════════════
   8. STATS COUNTER ANIMATION (via MutationObserver)
═══════════════════════════════════════════ */
function animateCounter (el) {
  const target = parseInt(el.textContent) || 0
  if (isNaN(target) || target === 0) return
  const dur = 900, t0 = performance.now()
  const tick = now => {
    const p = Math.min(1, (now - t0) / dur)
    el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3)))
    if (p < 1) requestAnimationFrame(tick)
  }
  requestAnimationFrame(tick)
}
// Watch the two nav stats counters
;['nav-count', 'nav-upvotes'].forEach(id => {
  const el = document.getElementById(id)
  if (!el) return
  new MutationObserver(() => { if (el.textContent !== '—') animateCounter(el) })
    .observe(el, { childList: true, characterData: true, subtree: true })
})
</script>
